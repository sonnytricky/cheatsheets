name: Release (.tar.gz)

on:
  push:
    branches:
      - main
    paths:
      - 'zensical.toml'

  pull_request:
    branches:
      - main
    paths:
      - 'zensical.toml'

permissions:
  contents: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout (WICHTIG: full history + tags)
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Git Setup
      - name: Setup Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      # 3️⃣ Tags sicher holen
      - name: Fetch tags
        run: git fetch --tags --force

      # 4️⃣ Version bestimmen (robust + safe fallback)
      - name: Determine next version
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")

          VERSION=${LAST_TAG#v}

          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)

          MSG="$(git log -1 --pretty=%B)"

          if echo "$MSG" | grep -iq "\[major\]"; then
            MAJOR=$((MAJOR+1))
            MINOR=0
            PATCH=0
          elif echo "$MSG" | grep -iq "\[minor\]"; then
            MINOR=$((MINOR+1))
            PATCH=0
          else
            PATCH=$((PATCH+1))
          fi

          NEXT_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "NEXT_VERSION=$NEXT_VERSION" >> $GITHUB_ENV

      # 5️⃣ Release-Dateien vorbereiten
      - name: Prepare release folder
        run: |
          rm -rf .release_temp
          mkdir -p .release_temp

          cp -r docs/assets .release_temp/assets
          cp -r docs/examples .release_temp/examples
          cp docs/stylesheets/extra.css .release_temp/extra.css
          cp docs/index.md .release_temp/index.md
          cp -r docs/images .release_temp/images
          cp -r overrides .release_temp/overrides
          cp .release/README.md .release_temp/README.md
          cp requirements.txt .release_temp/requirements.txt
          cp zensical.toml .release_temp/zensical.toml

      # 6️⃣ Archive bauen
      - name: Create archive
        run: |
          tar -czf zensical-release-${{ env.NEXT_VERSION }}.tar.gz -C .release_temp .

      # 7️⃣ Tag erstellen (WICHTIG: verhindert doppelte Releases)
      - name: Create Git tag
        run: |
          git tag v${{ env.NEXT_VERSION }}
          git push origin v${{ env.NEXT_VERSION }}

      # 8️⃣ GitHub Release erstellen (EINHEITLICH)
      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ env.NEXT_VERSION }}
          name: Release v${{ env.NEXT_VERSION }}
          artifacts: zensical-release-${{ env.NEXT_VERSION }}.tar.gz

          generateReleaseNotes: true
          draft: false
          prerelease: false