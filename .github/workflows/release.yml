name: Release (.tar.gz)

on:
  push:
    branches:
      - main
    paths:
      - 'zensical.toml'
  pull_request:
    branches:
      - main
    paths:
      - 'zensical.toml'

permissions:
  contents: write
  actions: read

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'   # ❗ Release nur bei Push (Merge)

    steps:
      # 1️⃣ Checkout
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2️⃣ Git Setup
      - name: Setup Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      # 3️⃣ Version bestimmen
      - name: Determine next version
        run: |
          LAST_TAG=$(git tag --list "v*" | sort -V | tail -n1)
          if [ -z "$LAST_TAG" ]; then
            LAST_TAG="v0.0.0"
          fi

          MAJOR=$(echo $LAST_TAG | cut -d. -f1 | tr -d v)
          MINOR=$(echo $LAST_TAG | cut -d. -f2)
          PATCH=$(echo $LAST_TAG | cut -d. -f3)

          MSG="$(git log -1 --pretty=%B)"

          if echo "$MSG" | grep -iq "\[major\]"; then
            MAJOR=$((MAJOR+1))
            MINOR=0
            PATCH=0
          elif echo "$MSG" | grep -iq "\[minor\]"; then
            MINOR=$((MINOR+1))
            PATCH=0
          else
            PATCH=$((PATCH+1))
          fi

          NEXT_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "NEXT_VERSION=$NEXT_VERSION" >> $GITHUB_ENV

      # 🆕 4️⃣ Check ob vorheriger Tag existiert (FIX für Fehler)
      - name: Check if previous tag exists
        run: |
          COUNT=$(git tag --list "v*" | wc -l)
          echo "TAG_COUNT=$COUNT" >> $GITHUB_ENV

      # 5️⃣ Release-Dateien sammeln
      - name: Prepare release folder
        run: |
          rm -rf .release_temp
          mkdir -p .release_temp
          cp -r docs/assets .release_temp/assets
          cp -r docs/examples .release_temp/examples
          cp docs/stylesheets/extra.css .release_temp/extra.css
          cp docs/index.md .release_temp/index.md
          cp -r docs/images .release_temp/images
          cp -r overrides .release_temp/overrides
          cp .release/README.md .release_temp/README.md
          cp requirements.txt .release_temp/requirements.txt
          cp zensical.toml .release_temp/zensical.toml

      # 6️⃣ tar.gz erstellen
      - name: Create archive
        run: |
          tar -czf zensical-release-${{ env.NEXT_VERSION }}.tar.gz -C .release_temp .

      # 7️⃣ Release erstellen
      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ env.NEXT_VERSION }}
          name: Release v${{ env.NEXT_VERSION }}
          artifacts: zensical-release-${{ env.NEXT_VERSION }}.tar.gz

          # 🔐 Immutable
          immutableCreate: true
          skipIfReleaseExists: true

          # 🏷️ Auto Changelog (FIXED)
          generateReleaseNotes: true
          generateReleaseNotesPreviousTag: ${{ env.TAG_COUNT != '0' }}

          draft: false
          prerelease: false