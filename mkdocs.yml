site_name: cheatsheets
site_url: https://mydomain.org/mysite

repo_url: ""
repo_name: ""

copyright: ""

docs_dir: docs

theme:
  name: material
  language: de
  logo: assets/logo.svg.png
  favicon: images/Tux-favicon.png
  icon:
    repo: fontawesome/brands/git-alt
    edit: material/pencil 
    view: material/eye

    # Dark Mode
  palette:
      scheme: slate  # default ist hell, slate ist dunkel
      primary: black   # red, pink, purple, deep purple, indigo, blue, light blue, cyan, teal, green, light green, lime, yellow, amber, orange, deep orange, brown, grey, blue grey, black, white
      accent: indigo

  # UI Features
  features:
#    - navigation.sections  # bei nein sind die sektionen eingeglppt außer in den man gerade ist
    - navigation.tabs  # ohne sticky, verschwinden die tabs 
    - navigation.tabs.sticky  # taps immer da, 
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - navigation.path
#    - header.autohide  # automatisches ausblenden des headers
    - search.suggest
    - search.highlight
    - content.action.edit
    - content.action.view  # quelltext ansehen
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
  #  - toc.integrate

# Plugins
plugins:
  - search:
      separator: '[\s\u200b\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
#  - minify:
#      minify_html: true    

# Markdown Erweiterungen
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

  - toc:
      permalink: true

  - pymdownx.highlight:
      use_pygments: true
      pygments_lang_class: true
      auto_title: true
      linenums_style: none  # pymdownx-inline
      anchor_linenums: true
      line_spans: null  # __span

extra:
  generator: false  # entfernt "Erstellt mit Material für MkDocs"

# Navigation
nav:
  - Home: index.md

  - Allgemeine Linux Befehle:
      - Übersicht: Allgemeine_Linux_Befehle/index.md
      - Dateien:
          - ls: Allgemeine_Linux_Befehle/Dateien/ls.md
      - System- und Benutzerinfo:
          - whami: Allgemeine_Linux_Befehle/System-_&_Benutzerinfo/whami.md

  - Debian-Ubuntu:
      - Übersicht: Debian-Ubuntu/index.md
      - Programme installieren: Debian-Ubuntu/Programme_installieren.md

  - Arch: Arch/index.md

  - GitBook:
      - Git: GitBook/Git-kommandos.md

  - Homelab:
      - Übersicht: Homelab/index.md
      - NGINX-LAN: Homelab/NGINX-LAN/README.md

  - offene Projekte:
      - Übersicht: offene_Projekte/index.md

      - Automatische Backups:
          - 1-projektvision: offene_Projekte/Automatische_Backups/1-projektvision.md
          - 2-architecture_insgesammt: offene_Projekte/Automatische_Backups/2-architecture_insgesammt.md
          - 4-Grafikische_Darstellung: offene_Projekte/Automatische_Backups/4-Grafikische_Darstellung.md
          - 5-architektur_Proxmox: offene_Projekte/Automatische_Backups/5-architektur_Proxmox.md
          - 6-architektur_X600: offene_Projekte/Automatische_Backups/6-architektur_X600.md
          - 7-architektur_OMV: offene_Projekte/Automatische_Backups/7-architektur_OMV.md
          - 8-architektur_UGOS: offene_Projekte/Automatische_Backups/8-architektur_UGOS.md
          - rsync-anleitung: offene_Projekte/Automatische_Backups/rsync-anleitung.md

      - WIKI_kompakt:
